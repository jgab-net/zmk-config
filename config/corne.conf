# Corne RGB Underglow (needed by the &rgb_ug bindings on the adjust layer)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Turn RGB off automatically when idle / on USB disconnect helps battery life
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Corne OLED Display (SSD1306 128x32, 0.91")
CONFIG_ZMK_DISPLAY=y

# Power saving: after 10s without typing the RGB turns off; any keypress brings
# it back. After 15 min the board deep-sleeps (press a key to wake, ~1s reconnect).
CONFIG_ZMK_IDLE_TIMEOUT=10000
CONFIG_ZMK_SLEEP=y

# Blank the OLED on idle, with the display on its own work queue: on the shared
# system queue the unblank work never ran, leaving the screen dark after idle.
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Don't cut external power when RGB turns off on idle: that rail also feeds the
# OLED, which goes blank and can't re-init until reset (zmk issue #674).
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Init the display late so ext power is already up when the SSD1306 is probed,
# otherwise the OLED stays dead after waking from deep sleep (zmk issue #674).
CONFIG_DISPLAY_INIT_PRIORITY=95
