# Corne RGB Underglow (needed by the &rgb_ug bindings on the adjust layer)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Turn RGB off automatically when idle / on USB disconnect helps battery life
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Corne OLED Display (SSD1306 128x32, 0.91")
CONFIG_ZMK_DISPLAY=y
